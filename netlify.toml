[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/deck/custom-deck"
  to = "/custom-deck/"
  status = 301

[[redirects]]
  from = "/deck/custom-deck/*"
  to = "/custom-deck/:splat"
  status = 301

[[redirects]]
  from = "/deck/wood-deck"
